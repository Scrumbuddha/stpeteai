<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — St. Pete AI</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1220;color:#e8edf8;font-family:'Roboto',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-wrap{width:100%;max-width:380px;padding:24px}
.login-brand{text-align:center;margin-bottom:32px}
.login-brand img{width:72px;height:72px;border-radius:16px;object-fit:cover;margin-bottom:14px;box-shadow:0 0 40px rgba(30,95,196,.4)}
.login-brand h1{font-size:1.2rem;font-weight:700;color:#fff}
.login-brand p{font-size:.82rem;color:#5c6680;margin-top:4px;font-family:'Roboto Mono',monospace;letter-spacing:.05em;text-transform:uppercase}
.login-card{background:#131929;border:1px solid #1e2a40;border-radius:14px;padding:32px}
.form-group{margin-bottom:20px}
label{display:block;font-size:.82rem;color:#7a93c8;margin-bottom:8px;font-weight:500}
input[type=password]{width:100%;background:#0d1220;border:1px solid #1e2a40;color:#fff;padding:12px 16px;border-radius:8px;font-size:.95rem;font-family:'Roboto',sans-serif;outline:none;transition:border-color .15s}
input[type=password]:focus{border-color:#3b7de0}
.btn-login{width:100%;background:#1e5fc4;color:#fff;border:none;padding:13px;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:'Roboto',sans-serif;transition:background .15s}
.btn-login:hover{background:#3b7de0}
.error{background:rgba(224,82,82,.12);border:1px solid rgba(224,82,82,.3);color:#f09090;padding:10px 14px;border-radius:7px;font-size:.85rem;margin-bottom:16px}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-brand">
    <img src="/static/images/Logo_0.0.png" alt="St. Pete AI">
    <h1>ST. PETE AI</h1>
    <p>Admin Panel</p>
  </div>
  <div class="login-card">
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
      <div class="form-group">
        <label for="password">Admin Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" autofocus required>
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>
  </div>
</div>
</body>
</html>
